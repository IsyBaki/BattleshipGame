<div class="fleet-page">
  <h2 class="title">Fleet</h2>

  <div class="fleet-box">
    <div class="layout">

      <!-- ==================== Left: Ships ==================== -->
      <div class="panel ships-panel">
        <div class="panel-title">Place your ships</div>

        <div class="ship-list" aria-label="Ship list">
          <div
            class="ship"
            *ngFor="let ship of ships"
            [attr.data-len]="ship.size"
            [attr.data-name]="ship.name"
            [title]="ship.name"
            draggable="true"
            (click)="selectShip(ship.name)"
            (dragstart)="onShipDragStart(ship.name)"
            (dragend)="onShipDragEnd()"
            [class.selected]="isSelected(ship.name)"
            [class.vertical]="isSelected(ship.name) && isVertical"
            [class.placed]="ship.placed"
          >
            <img
              [src]="ship.image"
              [alt]="ship.name"
              class="ship-img"
            />
          </div>
        </div>

        <div class="message" *ngIf="showMessage">
          please select a ship first!
        </div>

        <button
          class="rotate-btn"
          type="button"
          (click)="rotateSelected()"
        >
          ↻ Rotate
        </button>
      </div>

      <!-- ==================== Right: Ocean Board ==================== -->
      <div class="panel board-panel">
        <h2 class="board-title">Ocean</h2>

        <div class="board" aria-label="Ocean board">
          <div class="cell head corner"></div>

          <div
            class="cell head"
            *ngFor="let col of cols"
          >
            {{ col }}
          </div>

          <ng-container *ngFor="let row of rows">
            <div class="cell head">
              {{ row + 1 }}
            </div>

            <div
              *ngFor="let col of cols; let colIndex = index"
              class="cell water board-cell"
              (dragover)="onCellDragOver($event, row, colIndex)"
              (drop)="onCellDrop($event, row, colIndex)"
              (click)="onCellClick(row, colIndex)"
              [class.preview-valid]="isPreviewCell(row, colIndex) && previewValid"
              [class.preview-invalid]="isPreviewCell(row, colIndex) && !previewValid"
            >
              <ng-container *ngIf="isShipStartCell(row, colIndex)">
                <div
                  class="ship-on-board-wrap"
                  [class.vertical]="getShipAtCell(row, colIndex)?.vertical"
                  [attr.data-name]="getShipAtCell(row, colIndex)?.name"
                  [ngStyle]="getShipStyle(getShipAtCell(row, colIndex)!)"
                >
                  <img
                    [src]="getShipAtCell(row, colIndex)?.image"
                    [alt]="getShipAtCell(row, colIndex)?.name || ''"
                    class="ship-on-board-img"
                    draggable="false"
                  />
                </div>
              </ng-container>
            </div>
          </ng-container>
        </div>
      </div>

    </div>

    <button
      class="fleet-ready-btn"
      type="button"
      (click)="onReadyClick()"
    >
      {{ readyButtonText }}
    </button>
  </div>
</div>
