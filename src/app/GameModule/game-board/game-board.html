<!--=============================== Game Board Einstellungen =========================================-->

<div class="game-page">

  <!-- ========================= Users Info ========================= -->
  <div class="game-info">
    <div class="info-left">
      <div class="info-title">Player</div>
      <div class="info-value">Player 1 (You)</div>
    </div>

    <div class="info-middle">
      <div class="info-title">Turn</div>
      <div class="info-value">Your turn – click on the Target board</div>
    </div>

    <div class="info-right">
      <div class="info-title">Mode</div>
      <div class="info-value">Singleplayer (AI)</div>
    </div>
  </div>

  <!-- ========================= Hit / Miss Popup ========================= -->
  <div
    class="shot-popup"
    *ngIf="showPopup"
    [class.hit-popup]="isHitPopup"
    [class.miss-popup]="!isHitPopup"
  >
  <!-- HIT BILD -->
    <img
      *ngIf="isHitPopup"
      src="/image/hit/explosion.png"
      alt="Treffer"
      class="popup-hit-image"
    />
    <!-- MISS BILD -->
    <img
      *ngIf="!isHitPopup"
      src="/image/hit/miss.png"
      alt="Verfehlt"

      class="popup-hit-image"
    />


    <div class="popup-text">
      {{ isHitPopup ? 'Hit!' : 'Miss!' }}
    </div>


  </div>

  <!-- ================================ Game Boards ======================================= -->
  <div class="boards">

    <!-- ============================= Ocean Board ====================================== -->
    <div class="board-wrap">
      <h2 class="board-title">Ocean</h2>

      <div class="board">
        <div class="cell head corner"></div>

        <div
          class="cell head"
          *ngFor="let col of cols"
        >
          {{ col }}
        </div>

        <ng-container *ngFor="let row of rows">
          <div class="cell head">
            {{ row + 1 }}
          </div>

          <div
            *ngFor="let col of cols; let colIndex = index"
            class="cell"
            [ngClass]="getOceanCellClass(row, colIndex)"
          ></div>
        </ng-container>
      </div>
    </div>

    <!-- ============================= Target Board ====================================== -->
    <div class="board-wrap">
      <h2 class="board-title">Target</h2>

      <div class="board">
        <div class="cell head corner"></div>

        <div
          class="cell head"
          *ngFor="let col of cols"
        >
          {{ col }}
        </div>

        <ng-container *ngFor="let row of rows">
          <div class="cell head">
            {{ row + 1 }}
          </div>

          <div
            *ngFor="let col of cols; let colIndex = index"
            class="cell target-cell board-shot-cell"
            [ngClass]="[
              getTargetCellClass(row, colIndex),
              isTargetCellDisabled(row, colIndex) ? 'disabled' : '',
              isAnimatedHitCell(row, colIndex) ? 'cell-hit-animate' : '',
              isAnimatedMissCell(row, colIndex) ? 'cell-miss-animate' : ''
            ]"
            (click)="shoot(row, colIndex)"
          >
            <img
              *ngIf="isAnimatedHitCell(row, colIndex)"
              src="/image/hit/explosion.png"
              alt="Explosion"
              class="cell-explosion"
            />
          </div>
        </ng-container>
      </div>
    </div>

  </div>
</div>
